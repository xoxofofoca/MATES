<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presente Emilli</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .container {
            position: relative; z-index: 10; padding: 30px; width: 90%; max-width: 500px;
            text-align: center; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px);
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(255, 75, 43, 0.3);
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 3rem; color: #ff4b2b; margin-bottom: 20px; }

        #corpoSurpresa { display: none; opacity: 0; transition: 2s; }
        
        .texto { font-size: 1.1rem; line-height: 1.8; margin-bottom: 20px; }
        .promessa { display: block; margin-top: 15px; color: #ff416c; font-weight: 600; font-size: 1.3rem; text-shadow: 0 0 10px rgba(255, 65, 108, 0.7); }
        
        #legenda { margin-top: 20px; font-style: italic; color: #ff9a9e; min-height: 40px; }

        .btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; border: none;
            padding: 18px 40px; border-radius: 50px; font-size: 1.1rem; cursor: pointer;
            text-transform: uppercase; font-weight: bold; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <canvas id="universo"></canvas>

    <div class="container">
        <h1>Emilli dos Santos</h1>
        <button id="btnClick" class="btn" onclick="iniciar()">Veja sua surpresa ❤️</button>

        <div id="corpoSurpresa">
            <div class="texto">
                <p>Eu sei que por um momento eu te deixei. O mundo ficou vazio e sem cor...</p>
                <p>Mas isso me fez entender que não existe sentido em nada se você não estiver aqui.</p>
                <span class="promessa">Eu nunca mais vou te deixar. Prometo.</span>
            </div>
            <div id="legenda"></div>
        </div>
    </div>

    <div id="yt-player" style="position: absolute; top: -9999px;"></div>

    <script>
        // --- 1. GALÁXIA GIRANDO ---
        const canvas = document.getElementById('universo');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<400; i++) {
                stars.push({
                    a: Math.random() * Math.PI * 2,
                    d: Math.random() * (canvas.width / 1.5),
                    s: 0.0005 + Math.random() * 0.001,
                    r: Math.random() * 2
                });
            }
        }
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                s.a += s.s;
                let x = canvas.width/2 + Math.cos(s.a) * s.d;
                let y = canvas.height/2 + Math.sin(s.a) * s.d;
                ctx.beginPath(); ctx.arc(x, y, s.r, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        window.onresize = init; init(); draw();

        // --- 2. MÚSICA (API YOUTUBE) ---
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                videoId: 'yJEA_c6GxVE',
                playerVars: { 'start': 81 } // Começa em 1:21
            });
        }

        // --- 3. REVELAÇÃO ---
        function iniciar() {
            // Tenta dar play no YouTube
            if(player && player.playVideo) {
                player.playVideo();
            }

            document.getElementById('btnClick').style.display = 'none';
            const surpresa = document.getElementById('corpoSurpresa');
            surpresa.style.display = 'block';
            setTimeout(() => { surpresa.style.opacity = '1'; }, 100);

            const frases = [
                "Sentindo meu caminho de volta para você...",
                "Eu nunca quis te ver partir.",
                "Amantes, correndo em círculos...",
                "Tudo o que eu vejo é você.",
                "Prometo nunca mais te deixar."
            ];
            let i = 0;
            setInterval(() => {
                document.getElementById('legenda').innerText = frases[i];
                i = (i + 1) % frases.length;
            }, 4000);
        }
    </script>
</body>
</html>
